theme = "blowfish"
baseURL = "https://leafevans.github.io/"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
enableRobotsTXT = true
summaryLength = 70
buildDrafts = false
buildFuture = false
enableEmoji = true
googleAnalytics = "G-F2RN96YLDT"

[pagination]
pagerSize = 15

[imaging]
anchor = 'Center'

[taxonomies]
tag = "tags"
category = "categories"
author = "authors"
series = "series"

[sitemap]
changefreq = 'daily'
filename = 'sitemap.xml'
priority = 0.5

[outputs]
home = ["HTML", "RSS", "JSON"]

[related]
threshold = 0
toLower = false

[[related.indices]]
name = "tags"
weight = 100

[[related.indices]]
name = "categories"
weight = 100

[[related.indices]]
name = "series"
weight = 50

[[related.indices]]
name = "authors"
weight = 20

[[related.indices]]
name = "date"
weight = 10

[[related.indices]]
applyFilter = false
name = 'fragmentrefs'
type = 'fragments'
weight = 10

[markup]
[markup.highlight]
lineNos = true
lineNumbersInTable = true
noClasses = false

[markup.goldmark.renderer]
unsafe = true

[minify]
disableHTML = true
